# Configuração para o Motor Quântico usando PostgreSQL no Docker (pgvector)
default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  port: 5432
  username: postgres
  password: senha_quanti_ca
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: motor_quantico_development

test:
  <<: *default
  database: motor_quantico_test

# Configuração de Produção (Geralmente usa variáveis de ambiente)
production:
  primary: &primary_production
    <<: *default
    database: motor_quantico_production
    username: motor_quantico
    password: <%= ENV["MOTOR_QUANTICO_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: motor_quantico_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: motor_quantico_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: motor_quantico_production_cable
    migrations_paths: db/cable_migrate

